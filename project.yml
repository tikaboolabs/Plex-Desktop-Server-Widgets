name: PlexDesktopWidgets
options:
  bundleIdPrefix: com.jasonbarton
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  PlexDesktopWidgets:
    type: application
    platform: macOS
    sources:
      - path: PlexDesktopWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jasonbarton.PlexDesktopWidgets
        PRODUCT_NAME: Plex Desktop Widgets
        INFOPLIST_FILE: PlexDesktopWidgets/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
        ENABLE_APP_SANDBOX: false
